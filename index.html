<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple task manager to organize your daily tasks">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Task Manager</h1>
        
        <!-- Task Input Form -->
        <form id="taskForm">
            <label for="taskDescription">
                Task Description
            </label>
            <input 
                type="text" 
                id="taskDescription" 
                name="taskDescription"
                placeholder="What needs to be done?"
                required
                autofocus
            >
            <button type="submit">
                Add Task
            </button>
        </form>

        <!-- Tasks Display Section -->
        <section id="tasksSection" aria-label="Tasks list">
            <h2>Your Tasks</h2>
            
            <!-- Task List -->
            <ul id="taskList" class="task-list">
                <!-- Example task items for styling (will be replaced by JavaScript) -->
                <li class="task-item">
                    <input 
                        type="checkbox" 
                        id="task-1" 
                        class="task-checkbox"
                    >
                    <label for="task-1" class="task-label">
                        Example task: Buy groceries
                    </label>
                </li>
                <li class="task-item">
                    <input 
                        type="checkbox" 
                        id="task-2" 
                        class="task-checkbox"
                        checked
                    >
                    <label for="task-2" class="task-label task-label--completed">
                        Example task: Read documentation
                    </label>
                </li>
            </ul>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" hidden>
                <p>No tasks yet. Add your first task above! ✨</p>
            </div>
        </section>
    </main>
</body>
</html>
